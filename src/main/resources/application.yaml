spring:
  application:
    name: unifriends
  main:
    lazy-initialization: true   # only instantiate beans when first used — big startup memory win
    banner-mode: off
  jmx:
    enabled: false              # we don't use JMX monitoring; saves ~10MB
  datasource:
    url: ${JDBC_DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2      # down from 3 — 2 is enough for single-dyno low traffic
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        # Shrink Hibernate's internal caches (defaults are 2048 / 128)
        query.plan_cache_max_size: 64
        query.plan_parameter_metadata_max_size: 16
        # Disable reflection optimizer bytecode generation
        bytecode.use_reflection_optimizer: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

server:
  tomcat:
    threads:
      max: 10         # down from 20 — 10 handles plenty of concurrent requests for a small app
      min-spare: 2
    max-connections: 100    # default 8192 — cap total connections Tomcat will hold
    accept-count: 10        # default 100 — cap the queue

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  frontend-url: ${FRONTEND_URL}
  profanity:
    api-url: https://api.api-ninjas.com/v1/profanityfilter
    api-key: ${PROFANITY_API_KEY}
  cors:
    allowed-origins: ${FRONTEND_URL}
  cookie:
    secure: true  # set to false in application-local.yml for localhost (no HTTPS)
