spring:
  application:
    name: unifriends
  datasource:
    url: ${JDBC_DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3      # default 10 — each connection holds memory on both app and DB side
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false         # default true — silences the warning and frees connections sooner
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

server:
  tomcat:
    threads:
      max: 20         # default 200, each thread costs ~512k stack; 20 is plenty for low traffic
      min-spare: 4    # default 10

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  frontend-url: ${FRONTEND_URL}
  profanity:
    api-url: https://api.api-ninjas.com/v1/profanityfilter
    api-key: ${PROFANITY_API_KEY}
  cors:
    allowed-origins: ${FRONTEND_URL}
  cookie:
    secure: true  # set to false in application-local.yml for localhost (no HTTPS)
